name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - name: Install dependencies
        run: npm install

      - name: TypeScript type check
        run: npx tsc --noEmit || true

      - name: Run selfe core tests
        run: npx tsx tests/selfe.test.ts

  verify-skill-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify SKILL.md exists
        run: test -f SKILL.md && echo "SKILL.md: OK" || (echo "SKILL.md: MISSING" && exit 1)

      - name: Verify memory files exist
        run: |
          test -f memory/skills-log.md && echo "skills-log.md: OK" || exit 1
          test -f memory/skills-inventory.md && echo "skills-inventory.md: OK" || exit 1
          test -f gap-queue.md && echo "gap-queue.md: OK" || exit 1

      - name: Verify no placeholder content
        run: |
          ! grep -r "TODO\|FIXME\|placeholder\|tbd" SKILL.md --include="*.md" | grep -v "^docs\|^memory\|^gap" || echo "Warning: placeholder content found"

  verify-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List repo files
        run: find . -type f -not -path './.git/*' | sort

      - name: Required files present
        run: |
          for f in SKILL.md README.md LICENSE .gitignore docs/ARCHITECTURE.md src/selfe-core.ts tests/selfe.test.ts; do
            test -e "$f" && echo "✅ $f" || (echo "❌ $f MISSING" && exit 1)
          done
